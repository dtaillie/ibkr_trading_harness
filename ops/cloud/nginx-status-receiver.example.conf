# EXAMPLE ONLY. Reverse proxy for the hosted status receiver.
# Replace status.example.invalid with your domain and terminate HTTPS with your
# normal certificate tooling. Prefer a private VPN or source-IP allowlist.

server {
    listen 80;
    server_name status.example.invalid;

    # Redirect HTTP to HTTPS after certificates are installed.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name status.example.invalid;

    # Fill these with files managed by your certificate automation.
    ssl_certificate /etc/ssl/certs/status-receiver-fullchain.pem;
    ssl_certificate_key /etc/ssl/private/status-receiver-privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
