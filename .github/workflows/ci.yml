name: CI

on:
  push:
  pull_request:

jobs:
  public-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Public readiness audit
        run: python scripts/public_readiness_audit.py --fail-on-review

      - name: Compile Python files
        run: find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 python -m py_compile

      - name: Check dashboard JavaScript
        run: node --check web/dashboard/app.js

      - name: Tests
        run: PYTHONPATH=. pytest -q

      - name: Dashboard smokes
        run: |
          python scripts/smoke_dashboard.py
          python scripts/smoke_dashboard.py --scenario empty
          python scripts/smoke_dashboard.py --scenario seeded
          python scripts/smoke_dashboard_accessibility.py
