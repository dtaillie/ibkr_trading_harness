description: >
  EXAMPLE ONLY. Public-safe cloud/status telemetry config. This pushes generic
  runner status only; it does not include broker credentials or strategy logic.

node_id: example-local-trader

gateway:
  enabled: false
  host: 127.0.0.1
  port: 4002
  timeout_seconds: 1.0

runs:
  - id: example_plugin_runner
    path: paper_logs/example_plugin_runner
    # Optional freshness alert threshold for real deployments.
    # max_age_seconds: 900
    # Optional market/account freshness thresholds.
    # max_data_age_seconds: 300
    # max_account_age_seconds: 300
    # Optional position expectation: any, flat, or positioned.
    # expected_position_state: any
    # Status publishing includes bounded artifact evidence by default:
    # expected public artifact file names, byte counts, modified times, and
    # JSONL row counts. Raw artifact payloads and log text are not posted.
    recent_events:
      enabled: true
      max_rows: 5

supervisors:
  - id: example_plugin_supervisor
    path: paper_logs/plugin_supervisor/status.json
    # max_age_seconds: 300

remote_control:
  enabled: true
  audit:
    log_file: paper_logs/remote_control/audit.jsonl
    max_events: 50
    # max_age_seconds: 300

publish:
  file: paper_logs/cloud_status/latest_status.json
  endpoint: null
  token_env: null  # e.g. TRADING_STATUS_TOKEN
  timeout_seconds: 5.0

dashboard:
  host: 127.0.0.1
  port: 8765
  state_dir: paper_logs/cloud_status_server
  auth_token_env: null  # e.g. TRADING_STATUS_TOKEN
  # Optional per-token roles. If configured, any listed token can authenticate
  # dashboard/status endpoints, but command queue access is limited by the
  # token's allowed action classes/actions.
  # auth_tokens:
  #   - token_env: TRADING_STATUS_READ_TOKEN
  #     role: monitor
  #     allowed_action_classes: [read_only]
  #   - token_env: TRADING_STATUS_CONTROL_TOKEN
  #     role: operator
  #     allowed_action_classes: [read_only, control]
  network_access:
    enabled: false
    allowed_client_networks: []
    trust_x_forwarded_for: false
  command_rate_limit:
    enabled: true
    window_seconds: 60
    max_per_node: 30
  command_scopes:
    enabled: true
    # read_only: request/summarize/validate status commands.
    # control: pause/resume local runners.
    # launcher: run configured supervisor jobs; opt in only after review.
    allowed_action_classes:
      - read_only
      - control
    allowed_actions: []
  data_catalog:
    # Rows/files to inspect on the first Data Library refresh.
    default_limit: 200
    # Upper bound allowed by Data Library scans and exports.
    max_limit: 1000
  # Optional tamper-evident audit signing. Set this to an environment variable
  # that contains an HMAC secret; never commit the secret value.
  # command_audit_signature_env: TRADING_COMMAND_AUDIT_HMAC_KEY
  data_roots:
    - examples/data
  fetch_manifest_roots:
    - paper_logs/fetch_manifests
  # Optional ignored local registry for private Workbench plugin metadata.
  # Copy config/plugin_registry.example.yaml to config/plugin_registry_local.yaml
  # and keep real strategy specs out of public commits.
  plugin_registry_paths:
    - config/plugin_registry_local.yaml

notes:
  - Keep real endpoint tokens in environment variables, not config files.
  - This is read-only telemetry. Remote commands are intentionally separate.
  - Copy this config to an ignored local file to add private cache/history roots.
