description: >
  EXAMPLE ONLY. Public-safe remote command worker config. The cloud side queues
  low-risk commands; the local worker polls and enforces this allowlist.

node_id: example-local-trader

server:
  commands_url: http://127.0.0.1:8765/commands
  results_url: http://127.0.0.1:8765/command_results
  token_env: null  # e.g. TRADING_STATUS_TOKEN
  timeout_seconds: 5.0

worker:
  poll_seconds: 10
  max_commands_per_poll: 5

safety:
  require_local_enable_marker: true
  local_enable_marker: paper_logs/control/remote_commands.enabled
  actions_requiring_local_enable:
    - flatten_simulated_positions
    - restart_child_process
    - run_supervisor_once
  disabled_actions: []

audit:
  enabled: true
  log_file: paper_logs/remote_control/audit.jsonl
  # Optional: sign each local audit row with HMAC-SHA256. Set this env var on
  # the trading machine, and configure the same env name under
  # remote_control.audit.signature_env in the status publisher config.
  # signature_env: LOCAL_COMMAND_AUDIT_HMAC_KEY

allowed_actions:
  - flatten_simulated_positions
  - request_status
  - supervisor_status
  - summarize_run
  - validate_config
  - validate_supervisor_config
  - restart_child_process
  - run_supervisor_once
  - pause_runner
  - resume_runner

status_config: config/cloud_status.example.yaml

control:
  pause_marker: paper_logs/control/example_plugin_runner.pause

configs:
  example_plugin_runner: config/plugin_runner.example.yaml

supervisors:
  example_plugin_supervisor: config/plugin_supervisor.example.yaml

runs:
  example_plugin_runner: paper_logs/example_plugin_runner

notes:
  - No arbitrary shell commands are supported.
  - No broker credentials are stored here.
  - Reserved high-risk actions such as enable_live_orders, change_strategy_config, and flatten_live_positions are rejected by both the receiver and this worker even if someone adds them to allowed_actions.
  - flatten_simulated_positions only operates on configured file-backed local broker state.
  - run_supervisor_once can launch configured local jobs; remove it from allowed_actions for monitoring-only deployments.
  - restart_child_process writes only a configured supervisor job restart marker; the local supervisor owns the actual restart.
  - With require_local_enable_marker=true, launcher actions are rejected until local_enable_marker exists on this machine.
  - max_commands_per_poll limits how many queued commands the worker will consume in one poll cycle.
  - Pause/resume writes/removes the marker used by config/plugin_runner.example.yaml.
