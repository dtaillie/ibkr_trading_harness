description: >
  EXAMPLE ONLY. Generic public plugin-runner config using the SMA crossover
  example strategy and local sample bars. This demonstrates wiring only; it is
  not a viable strategy.

metadata:
  strategy_plugin: examples.strategies.sma_crossover:create_strategy
  status: example_only

strategy:
  fast: 5
  slow: 20
  position_fraction: 0.01   # 1% of equity per entry, sized to fit this example's tiny risk caps

runner:
  mode: replay
  starting_cash: 10000
  history_bars: 20
  output_dir: paper_logs/example_plugin_runner
  clean_output_dir: true
  loop: false
  loop_interval_seconds: 60
  skip_duplicate_latest: true
  session:
    timezone: America/New_York
    start: "09:30"
    end: "16:00"
    weekdays:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
    outside_session: idle

data:
  source: files
  timestamp_column: timestamp
  files:
    SPY: examples/data/SPY_5min_sample.csv

execution:
  allowed_sides:
    - buy
    - sell
  allowed_order_types:
    - market
  allow_short: false
  require_current_price: true
  require_order_approval: false
  enable_live_orders: false
  # For manual per-order approval, keep approvals outside a cleaned output_dir.
  # approval_dir: paper_logs/control/order_approvals
  max_orders_per_run: 1
  max_notional_per_order: 100
  max_quantity: 10
  max_cash_quantity: 100
  max_gross_exposure_pct: 0.05
  max_short_notional_per_symbol: 100
  max_total_short_notional: 100
  sim_slippage_bps: 0
  sim_buy_slippage_bps: 0
  sim_sell_slippage_bps: 0
  sim_market_impact_bps_per_10k: 0
  # Public-safe quote context for execution-quality review. The generic runner
  # estimates bid/ask around the latest bar close; broker-native NBBO capture
  # belongs in private/live adapters.
  sim_quote_spread_bps: 0
  sim_commission_bps: 0
  sim_commission_per_share: 0
  sim_min_commission: 0
  sim_max_commission_pct: 1
  # Optional venue/model-specific overrides. A plugin can request one with
  # OrderIntent.metadata.venue or metadata.cost_model; unspecified fields fall
  # back to the global settings above.
  sim_cost_models:
    example_venue:
      sim_slippage_bps: 0
      sim_commission_bps: 0
      sim_commission_per_share: 0
      sim_min_commission: 0
  sim_short_borrow_bps_annual: 0
  sim_short_borrow_bps_annual_by_symbol: {}

control:
  pause_marker: paper_logs/control/example_plugin_runner.pause
  stop_marker: paper_logs/control/example_plugin_runner.stop

broker:
  adapter: ibkr
  host: 127.0.0.1
  port: 4002
  client_id: 301
  account_mode: paper
  # Optional extra paper-safety check. Set this in ignored local configs to
  # the paper account id expected from the broker session.
  # expected_account_id: paper-account-id-placeholder
  allow_live_broker_port_for_paper: false
  # For local adapter plumbing tests without IBKR, copy this config privately
  # and set adapter: file with state_path/orders_path/prices.

notes:
  - Example only; do not trade this.
  - Paper mode submits IBKR orders only with --confirm-paper-orders.
  - Live mode is a guarded placeholder in the public runner and still refuses execution.
  - Point metadata.strategy_plugin at a private plugin for real paper testing.
