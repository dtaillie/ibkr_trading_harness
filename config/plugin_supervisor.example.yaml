description: >
  EXAMPLE ONLY. Public-safe generic supervisor config. This demonstrates how to
  schedule local plugin-runner commands and publish local status. It is not a
  viable strategy configuration.

node_id: example-local-trader

supervisor:
  state_file: paper_logs/plugin_supervisor/status.json
  log_dir: paper_logs/plugin_supervisor/jobs
  poll_seconds: 30

jobs:
  - id: example_plugin_runner
    enabled: true
    cwd: .
    process_mode: blocking
    command:
      - python3
      - live/plugin_runner.py
      - --config
      - config/plugin_runner.example.yaml
      - --mode
      - replay
      - --max-steps
      - "3"
    run_dir: paper_logs/example_plugin_runner
    pause_marker: paper_logs/control/example_plugin_runner.pause
    schedule:
      market: always
      run_on_start: true
      interval_seconds: 3600
      max_runtime_seconds: 60
    # For long-running loop jobs, switch process_mode to managed and enable a
    # conservative restart policy after reviewing the command and output dir.
    # restart_marker: paper_logs/control/example_plugin_runner.restart
    # restart:
    #   on_exit: true
    #   on_stale_runner_status: true
    #   runner_status_path: paper_logs/example_plugin_runner/runner_status.json
    #   max_status_age_seconds: 300
    #   stop_grace_seconds: 5
    #   max_restarts_per_hour: 3

notes:
  - Commands are argv lists, not shell strings.
  - Use process_mode=managed for long-running paper/shadow processes.
  - Managed restart policies are opt-in and should point at runner_status.json.
  - Keep private strategy commands in ignored local configs.
  - Pause/resume writes or removes the configured pause marker.
