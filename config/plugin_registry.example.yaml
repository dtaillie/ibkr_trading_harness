description: >
  EXAMPLE ONLY local plugin registry template -- do not publish real strategy
  package names, tuned parameters, or private strategy logic. Copy this to
  config/plugin_registry_local.yaml for private use and keep that copy out of the
  public repo (it is gitignored).

plugins:
  - id: local_private_strategy
    label: Local Private Strategy
    spec: your_package.private_strategy:create_strategy
    status: private_local
    visibility: private_local
    description: Local metadata only. Replace this entry in an ignored local copy.
    boundary: Loaded from an ignored local registry; keep private strategy logic and tuned configs out of commits.
    strategy_fields:
      - name: symbol
        label: Symbol
        kind: text
        default: SPY
        required: true
        description: Ticker consumed by the local plugin.
        help: Must match a symbol in the selected dataset.
      - name: signal_threshold
        label: Signal Threshold
        kind: number
        default: 0.5
        min: 0
        step: 0.01
        description: Public-safe metadata for a numeric local plugin input.
        help: Replace with private local metadata before use.
        advanced: false
    validation_rules:
      - id: signal_threshold_required
        type: required
        label: Signal Threshold Required
        field: signal_threshold
        help: Declarative validation metadata for the local plugin registry.
        error: strategy.signal_threshold must be set
    result_fields:
      - name: signal_value
        label: Signal Value
        kind: number
        help: Public-safe diagnostics.dashboard field label for artifact tables.
        decimals: 2
      - name: reason
        label: Decision Reason
        kind: text
        help: Human-readable decision reason emitted by the local plugin.
    result_sections:
      - id: strategy_status
        label: Strategy Status
        description: Grouping for public-safe result fields.
        fields:
          - signal_value
          - reason
    result_widgets:
      - id: signal_custom_chart
        label: Signal Custom Chart
        kind: custom_chart
        chart_kind: line_chart
        point_limit: 40
        description: Declarative chart wiring using an allowlisted renderer.
        fields:
          - signal_value
