description: >
  EXAMPLE ONLY. Copy this to config/plugin_registry_local.yaml for local
  private use. Keep real strategy package names, tuned parameters, and private
  strategy logic out of the public repo.

plugins:
  - id: local_example_placeholder
    label: Local example placeholder
    spec: your_package.example_strategy:create_strategy
    status: private_local
    visibility: private_local
    description: Local metadata only. Replace this in an ignored local copy.
    boundary: Loaded from an ignored local registry; do not publish real edge.
    strategy_fields:
      - name: example_parameter
        label: Example Parameter
        kind: checkbox
        default: false
        description: Example-only toggle that proves plugin field rendering.
        help: Public-safe wiring example only; do not publish tuned values.
        advanced: false
    validation_rules:
      - id: example_parameter_required
        type: required
        label: Example Parameter Required
        field: example_parameter
        help: Example-only declarative validation metadata.
        error: strategy.example_parameter must be set for this example wiring check
    result_fields:
      - name: example_score
        label: Example Score
        kind: number
        help: Public-safe diagnostics.dashboard field label for artifact tables.
        decimals: 2
        suffix: example units
      - name: example_reason
        label: Example Reason
        kind: text
        help: Human-readable reason emitted by the private plugin.
    result_sections:
      - id: example_status
        label: Example Status
        description: Example-only grouping for public-safe result fields.
        fields:
          - example_score
          - example_reason
    result_widgets:
      - id: example_custom_chart
        label: Example Custom Chart
        kind: custom_chart
        chart_kind: line_chart
        point_limit: 40
        description: Example-only declarative chart wiring using an allowlisted renderer.
        fields:
          - example_score
